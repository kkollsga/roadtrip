    <path fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.2" stroke-linecap="round" d="M0 -88Q-1 -76 -2 -66"/>
    <path fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.2" stroke-linecap="round" d="M0 -88Q1 -76 2 -66"/>

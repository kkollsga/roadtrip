<svg data-meters="0.9 1.2" xmlns="http://www.w3.org/2000/svg" viewBox="-58 -102 116 106">
  <!-- Variant 1: lying down (recumbent), head held high, facing RIGHT, mane halo -->
  <g class="variant">
    <!-- reclining body, low and long, rump at left, joined under the mane -->
    <path class="tan" fill="#c89e62" d="M-50 -6Q-54 -28 -32 -36Q-6 -42 18 -38Q34 -34 34 -22Q34 -10 20 -6Z"/>
    <!-- folded front paws extended forward (right) -->
    <path class="tan" fill="#c89e62" d="M14 -16Q34 -18 48 -12Q52 -10 47 -6L14 -6Q11 -10 14 -16Z"/>
    <path fill="rgba(0,0,0,0.10)" d="M26 -14Q38 -15 46 -11Q42 -9 32 -10Q26 -11 26 -14Z"/>
    <!-- haunch hump at the left (rump) -->
    <path class="tan" fill="#c89e62" d="M-50 -8Q-56 -30 -40 -40Q-28 -44 -24 -32Q-26 -18 -38 -10Z"/>
    <!-- tail curling from the rump -->
    <path class="tan" fill="#c89e62" d="M-48 -34Q-56 -36 -55 -26Q-51 -30 -46 -29Z"/>
    <path class="brown" fill="#7a5a3c" d="M-56 -28Q-58 -22 -54 -20Q-52 -24 -54 -27Z"/>
    <!-- MANE: a rounded dark halo around the head, overlapping the shoulders -->
    <path class="brown" fill="#7a5a3c" d="M6 -42Q2 -70 26 -78Q50 -82 54 -58Q56 -36 40 -30Q28 -26 16 -28Q8 -32 6 -42Z"/>
    <!-- mane ruff lobes for a shaggy silhouette -->
    <path class="brown" fill="#7a5a3c" d="M8 -44Q2 -60 8 -74Q14 -82 24 -80Q16 -72 14 -58Q12 -48 12 -42Z"/>
    <path class="brown" fill="#7a5a3c" d="M22 -76Q34 -84 46 -76Q38 -70 30 -70Q38 -74 26 -74Z"/>
    <path class="brown" fill="#7a5a3c" d="M46 -70Q56 -60 52 -44Q46 -52 40 -54Q48 -54 46 -68Z"/>
    <path class="brown" fill="#7a5a3c" d="M10 -36Q8 -26 20 -26Q12 -32 10 -38Z"/>
    <!-- FACE disc (golden) centered inside the mane -->
    <path class="tan" fill="#c89e62" d="M22 -62Q40 -64 44 -50Q46 -38 34 -34Q22 -32 18 -44Q18 -56 22 -62Z"/>
    <!-- muzzle patch (lighter, lower, protruding right) -->
    <path class="tan" fill="#c89e62" d="M36 -46Q46 -46 48 -39Q46 -33 38 -34Q33 -39 36 -46Z"/>
    <path fill="rgba(255,255,255,0.10)" d="M37 -44Q45 -44 47 -39Q43 -36 38 -37Q35 -41 37 -44Z"/>
    <!-- nose dot -->
    <path class="dark" fill="#3a2c20" d="M44 -41Q48 -41 47 -36Q43 -35 42 -39Z"/>
    <!-- eye -->
    <path class="dark" fill="#3a2c20" d="M31 -52Q34 -53 34 -49Q32 -48 30 -51Z"/>
    <!-- small rounded ear poking from the mane top -->
    <path class="tan" fill="#c89e62" d="M24 -72Q22 -79 30 -78Q33 -73 28 -71Z"/>
    <path class="brown" fill="#7a5a3c" d="M25 -73Q24 -78 29 -77Q31 -74 26 -72Z"/>
    <!-- mane top-left highlight -->
    <path fill="rgba(255,255,255,0.08)" d="M8 -44Q2 -60 8 -74Q14 -81 22 -80Q12 -72 10 -56Q9 -48 10 -42Z"/>
    <!-- body underside shadow -->
    <path fill="rgba(0,0,0,0.12)" d="M-44 -6Q-12 -10 30 -8Q-8 -4 -44 -4Z"/>
  </g>
  <!-- Variant 2: standing in profile, head facing LEFT, mane enveloping chest -->
  <g class="variant">
    <!-- far legs (darker) -->
    <path class="tan" fill="#c89e62" d="M26 -28L25 0L32 0L33 -28Z"/>
    <path class="tan" fill="#c89e62" d="M-2 -26L-3 0L4 0L4 -26Z"/>
    <path fill="rgba(0,0,0,0.14)" d="M26 -28L25 0L32 0L33 -28Z"/>
    <path fill="rgba(0,0,0,0.14)" d="M-2 -26L-3 0L4 0L4 -26Z"/>
    <!-- near legs -->
    <path class="tan" fill="#c89e62" d="M30 -30L29 0L37 0L38 -30Z"/>
    <path class="tan" fill="#c89e62" d="M2 -28L1 0L9 0L9 -28Z"/>
    <!-- tail with dark tip -->
    <path class="tan" fill="#c89e62" d="M36 -38Q48 -34 47 -14L44 -14Q45 -32 34 -36Z"/>
    <path class="brown" fill="#7a5a3c" d="M44 -16Q49 -10 45 -6Q42 -11 43 -16Z"/>
    <!-- body barrel, rump high at right, sloping to the chest under the mane (left) -->
    <path class="tan" fill="#c89e62" d="M2 -32Q-2 -54 20 -58Q40 -60 44 -44Q46 -32 36 -26Q18 -22 8 -24Q3 -26 2 -32Z"/>
    <!-- MANE: rounded dark mass enveloping head + chest (head at upper-left), smooth domed crown -->
    <path class="brown" fill="#7a5a3c" d="M-2 -34Q-26 -36 -30 -60Q-32 -86 -4 -88Q22 -88 22 -62Q22 -42 4 -38Q-1 -34 -2 -34Z"/>
    <!-- chest mane lobe softly blending down toward the front leg -->
    <path class="brown" fill="#7a5a3c" d="M0 -38Q-4 -26 4 -26Q10 -32 6 -40Z"/>
    <!-- mane ruff side lobes (rounded) -->
    
    <path class="brown" fill="#7a5a3c" d="M16 -76Q27 -68 22 -54Q18 -62 12 -64Q19 -64 16 -76Z"/>
    <!-- FACE disc (golden), facing left -->
    <path class="tan" fill="#c89e62" d="M-6 -78Q-24 -76 -24 -60Q-22 -46 -4 -46Q14 -48 14 -64Q12 -78 -6 -78Z"/>
    <!-- muzzle patch (lighter, protruding left) -->
    <path class="tan" fill="#c89e62" d="M-20 -61Q-28 -60 -28 -53Q-27 -48 -19 -49Q-16 -55 -20 -61Z"/>
    <path fill="rgba(255,255,255,0.10)" d="M-21 -58Q-26 -57 -26 -52Q-24 -50 -20 -51Q-18 -55 -21 -58Z"/>
    <!-- nose dot -->
    <path class="dark" fill="#3a2c20" d="M-27 -55Q-30 -55 -29 -51Q-27 -50 -25 -53Z"/>
    <!-- eye -->
    <path class="dark" fill="#3a2c20" d="M-12 -66Q-9 -67 -9 -63Q-11 -62 -13 -65Z"/>
    <!-- small rounded ears poking from the mane top -->
    <path class="tan" fill="#c89e62" d="M-12 -84Q-14 -91 -6 -90Q-3 -85 -8 -83Z"/>
    <path class="brown" fill="#7a5a3c" d="M-11 -85Q-12 -90 -7 -89Q-5 -86 -10 -84Z"/>
    <path class="tan" fill="#c89e62" d="M2 -84Q0 -90 7 -89Q9 -85 4 -83Z"/>
    <path class="brown" fill="#7a5a3c" d="M3 -85Q2 -89 6 -88Q8 -86 4 -84Z"/>
    <!-- mane top-left highlight -->
    <path fill="rgba(255,255,255,0.08)" d="M-2 -34Q-26 -36 -30 -60Q-32 -82 -16 -87Q-28 -76 -26 -60Q-22 -42 -2 -36Z"/>
    <!-- ground shadow -->
    <path fill="rgba(0,0,0,0.12)" d="M-6 -4Q22 -8 42 -6Q22 -2 -6 -2Z"/>
  </g>
</svg>

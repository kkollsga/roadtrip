# Roadtrip biome definition. Compiled by `node tools/build.js` into
# js/gen/data.js — run the build (or its --watch mode) after editing.
#
# colors are full-daylight bases; the engine grades them per frame by time
# of day, depth haze, vibrance and weather. Bands:
#   near     items between the tree line and the road shoulder (depth-staggered)
#   front    items in front of the road, nearest the camera
#   midridge rare structures on the mid ridge (mesas, lighthouses...)
#   forest   distant wooded bands; depth = how deep the woods reach
# table entries: { asset, w } plus optional depth: [z0, z1] limiting the item
# to a slice of the band (0 = far edge, 1 = nearest).
name: desert
order: 2
terrain:
  far: '#a3765a'
  mid: '#c29a6a'
  ground: '#cfa979'
  farAmp: 0.06
  midAmp: 0.04
  ridged: 0
  snowcap: 0
  water: 0
  waterCol: '#3c6f95'
flora:
  foliage: '#5d6b42'
  foliage2: '#7e6447'
  trunk: '#65503c'
  avenue: palm
light:
  grade: { tint: '#ffb24d', strength: 0.22, multiplier: 1.06 }
  aurora: 0
weather:
  clear: 9
  overcast: 0.6
near:
  density: 1.2
  table:
    - { asset: cactus, w: 0.45 }
    - { asset: bush, w: 0.2 }
    - { asset: rock, w: 0.2 }
    - { asset: tuft, w: 0.1 }
    - { asset: sign, w: 0.05 }
front:
  density: 1.0
  table:
    - { asset: rock, w: 0.45 }
    - { asset: tuft, w: 0.28 }
    - { asset: bush, w: 0.15 }
    - { asset: cactus, w: 0.12 }
horizon:
  density: 0.55
  table:
    - { asset: mesa, w: 1 }
extras:
  landmarks:
    - monumentValley
    - delicateArch
    - uluru
    - namibDune
    - bryceHoodoos
  occluder: 0
  baseWeight: 6
variants:
  - key: mesaField
    weight: 2
    horizon: { density: 1.3 }
  - key: dunes
    weight: 2
    terrain: { farAmp: 0.05 }
    near:
      density: 0.7
      table:
        - { asset: tuft, w: 0.4 }
        - { asset: rock, w: 0.35 }
        - { asset: bush, w: 0.25 }
